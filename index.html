<!DOCTYPE html>
<html lang="th">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>

</head>
<body>

  <!-- ปุ่มมุมบนซ้าย/ขวา -->
  <div class="top-bar">
    <button>←</button>
    <button>⚙</button>
  </div>

  <!-- รูปโปรไฟล์ + ชื่อ -->
  <div class="profile">
    <div class="avatar-wrapper" id="avatar">
    <img id="profileImg" src="Pictures/Teawpie.jpg" alt="profile">
    <div class="fallback" id="fallback">T</div>
  </div>
    <h1>Teawpie</h1>
    <p>@Teawpie</p>

   <input type="file" id="fileInput" accept="image/*" style="display:none;">

   <script src="script.js"></script>
  </div>

  <!-- สามช่องแนวนอน -->
<div class="info-grid">
  <div class="card">
    <a href="https://www.instagram.com/teawpie" target="_blank">
    <img src="icon/instagram.png" alt="Instagram" width="20">
    </a>
</div>
  <div class="card">
    <a href="https://Line.me/ti/p/~honeypie_001" target="_blank">
    <img src="icon/line.png" alt="Line" width="20">
    </a>
</div>
  <div class="card">
    <a href="https://www.tiktok.com/@teawpie" target="_blank">
    <img src="icon/tik-tok.png" alt="TikTok" width="20">
    </a>
</div>
</div>

    <!-- ส่วนสินค้า -->
<div class="shop-section">
  <p class="shop-label">🛍 สินค้า</p>
  <div class="product-grid" id="productGrid">

    <!-- การ์ดสินค้า (copy ซ้ำเพื่อเพิ่ม) -->
    <a class="product-card" href="ใส่ลิงก์ที่นี่" target="_blank">
      <div class="product-img">
        <img src="ใส่รูปที่นี่" alt="ชื่อสินค้า">
      </div>
      <div class="product-info">
        <p class="product-name">ชื่อสินค้า</p>
        <p class="product-price"><span>฿ 000</span></p>
      </div>
    </a>

  </div>
  
</div>

</body>
</html>
